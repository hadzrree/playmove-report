<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMove — Login</title>
<style>
:root{--navy:#252A64;--yellow:#FDC839;--coral:#F16057;--teal:#00AD9A;--bg:#F6F7FB;--card:#FFFFFF;--line:#E3E6F0;--txt:#23264A;--muted:#7A7FA0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;min-height:100vh;}
header.app{background:var(--navy);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:14px;}
header.app .mark{background:#fff;border-radius:8px;padding:8px 10px;color:var(--navy);font-weight:800;}
header.app h1{font-size:16px;font-weight:600;}
header.app .tag{margin-left:auto;font-size:12px;background:var(--yellow);color:var(--navy);font-weight:700;padding:3px 10px;border-radius:20px;}
main{max-width:480px;margin:0 auto;padding:48px 24px 90px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 24px;margin-bottom:14px;}
h2.title{font-size:21px;color:var(--navy);margin-bottom:2px;}
p.sub{color:var(--muted);margin-bottom:18px;font-size:13.5px;line-height:1.5;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12.5px;font-weight:600;color:var(--navy);}
.field input{border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fff;}
.field input:focus{outline:2px solid var(--yellow);}
.btn{border:0;border-radius:9px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;}
.btn.primary{background:var(--navy);color:#fff;width:100%;}
.authlink{font-size:13.5px;color:var(--muted);text-align:center;margin-top:14px;}
.authlink a{color:var(--navy);font-weight:700;}
.ok{background:#E6F7F3;border:1px solid var(--teal);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;}
.flag{background:#FDECEF;border:1px solid var(--coral);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;}
footer.note{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:8px 24px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;z-index:60;}
</style>
</head>
<body>
<header class="app">
  <span class="mark">PM</span>
  <h1>Initial Screening Report Generator</h1>
  <span class="tag">PILOT</span>
</header>
<main>
  <section class="card">
    <h2 class="title">Log in</h2>
    <p class="sub">Sign in with your Supabase account to open the report generator.</p>
    <div data-auth-message style="display:none"></div>
    <form data-login-form>
      <div class="field"><label for="email">Email address</label><input id="email" name="email" type="email" autocomplete="email" required></div>
      <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
      <button class="btn primary" type="submit">Log in →</button>
    </form>
    <p class="authlink">Need an account? <a href="./signup.html">Create one</a>.</p>
  </section>
</main>
<footer class="note"><span>Supabase Authentication keeps your session active on this device.</span><span>PlayMove Therapy for Children</span></footer>
<script type="module" src="./auth.js" data-auth-page="login"></script>
</body>
</html>
